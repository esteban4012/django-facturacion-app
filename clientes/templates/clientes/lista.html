<!DOCTYPE html>
<html>
<head>
    <title>Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1>Clientes</h1>

<a href="/clientes/crear/" class="btn btn-primary mb-3">➕ Crear cliente</a>

<ul class="list-group">
    {% for cliente in clientes %}
        <li class="list-group-item d-flex justify-content-between">
            {{ cliente.nombre }} - {{ cliente.correo }}
            <div>
                <a href="/clientes/editar/{{ cliente.id }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="/clientes/eliminar/{{ cliente.id }}" class="btn btn-danger btn-sm">Eliminar</a>
            </div>
        </li>
    {% endfor %}
</ul>

</body>
</html>
