{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-4">

        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center">
                <h4>Iniciar Sesión</h4>
            </div>

            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    {{ form.as_p }}

                    <button class="btn btn-primary w-100">
                        Ingresar
                    </button>
                </form>
            </div>
        </div>

    </div>
</div>

{% endblock %}
