<!DOCTYPE html>
<html>
<head>
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1>Productos</h1>

<a href="/productos/crear/" class="btn btn-primary mb-3">➕ Crear Producto</a>

<ul class="list-group">
    {% for producto in producto %}
        <li class="list-group-item d-flex justify-content-between">
            {{ producto.nombre }} - {{ producto.precio }}
            <div>
                <a href="/productos/editar/{{ producto.id }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="/productos/eliminar/{{ producto.id }}" class="btn btn-danger btn-sm">Eliminar</a>
            </div>
        </li>
    {% endfor %}
</ul>

</body>
</html>
